name: arkanoid
description: Arkanoid brick breaker game with multiple themes.
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  google_mobile_ads: ^5.1.0
  shared_preferences: ^2.3.2
  # audioplayers: ^6.1.0        # добавить когда будут звуки

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/ico/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/ico/
